operation: |
    mutation {
        v1: createVenue(data: {name: "Venue1"}) {
            id
        }
        v2: createVenue(data: {name: "Venue2"}) {
            id
        }
        c1: createConcert(data: {title: "Concert1", venue: {id: 1}, published: true}) {
            id
        }
        c2: createConcert(data: {title: "Concert2", venue: {id: 2}, published: false}) {
            id
        }
    }
auth: |
    {
        "role": "admin"
    }
