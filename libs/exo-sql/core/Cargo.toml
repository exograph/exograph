[package]
name = "exo-sql-core"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = []
bigdecimal = ["pg_bigdecimal"]
test-support = []

[dependencies]
pg_bigdecimal = { version = "0.1", optional = true }
bytes.workspace = true
uuid.workspace = true
indexmap.workspace = true
tokio-postgres = { workspace = true, features = [
  "with-chrono-0_4",
  "with-serde_json-1",
  "with-uuid-1",
], default-features = false }
chrono.workspace = true
regex.workspace = true
serde.workspace = true
postcard.workspace = true
thiserror.workspace = true
typed-generational-arena.workspace = true
serde_json.workspace = true

[target.'cfg(target_family = "wasm")'.dependencies.tokio-postgres]
workspace = true
features = ["js", "with-chrono-0_4", "with-serde_json-1", "with-uuid-1"]
default-features = false

[dev-dependencies]
wasm-bindgen-test.workspace = true
wasm-bindgen-test-macro.workspace = true

[lib]
doctest = false
