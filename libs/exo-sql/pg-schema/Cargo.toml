[package]
name = "exo-sql-pg-schema"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = []
bigdecimal = ["pg_bigdecimal"]
interactive-migration = ["toml"]

[dependencies]
exo-sql-core = { path = "../core" }
exo-sql-pg = { path = "../pg" }
pg_bigdecimal = { version = "0.1", optional = true }
exo-sql-pg-connect = { path = "../pg-connect" }
regex.workspace = true
serde.workspace = true
thiserror.workspace = true
tokio-postgres = { workspace = true, features = [
  "with-chrono-0_4",
  "with-serde_json-1",
  "with-uuid-1",
], default-features = false }
wildmatch.workspace = true
toml = { workspace = true, optional = true }

[target.'cfg(target_family = "wasm")'.dependencies.tokio-postgres]
workspace = true
features = ["js", "with-chrono-0_4", "with-serde_json-1", "with-uuid-1"]
default-features = false

[dev-dependencies]
exo-sql-pg-connect = { path = "../pg-connect", features = ["test-support", "testing"] }

[target.'cfg(not(target_family = "wasm"))'.dev-dependencies.tokio]
workspace = true
features = ["rt", "macros"]

[lib]
doctest = false
