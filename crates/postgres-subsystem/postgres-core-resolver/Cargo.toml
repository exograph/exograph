[package]
name = "postgres-core-resolver"
version.workspace = true
edition.workspace = true
publish = false

[features]
network = [
    "exo-sql-pg-connect/tls",
    "exo-sql-pg-connect/postgres-url",
    "exo-sql-pg-connect/testing",
    "exo-sql-pg-connect/pool",
]
bigdecimal = ["exo-sql-pg/bigdecimal"]

[dependencies]
async-trait.workspace = true
thiserror.workspace = true
tracing.workspace = true
tokio-postgres.workspace = true
base64 = "0.22.1"
chrono.workspace = true
serde_json.workspace = true
uuid.workspace = true
maybe-owned.workspace = true
futures.workspace = true
indexmap.workspace = true


exo-sql-pg = { path = "../../../libs/exo-sql/pg" }
exo-sql-pg-connect = { path = "../../../libs/exo-sql/pg-connect" }
exo-env = { path = "../../../libs/exo-env" }
common = { path = "../../common" }
core-model = { path = "../../core-subsystem/core-model" }
postgres-core-model = { path = "../postgres-core-model" }
core-resolver = { path = "../../core-subsystem/core-resolver" }

[dev-dependencies]
wasm-bindgen-test.workspace = true

[lib]
crate-type = ["lib"]
doctest = false
