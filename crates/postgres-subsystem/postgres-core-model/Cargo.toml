[package]
name = "postgres-core-model"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
serde.workspace = true

exo-sql-pg = { path = "../../../libs/exo-sql/pg" }
core-model = { path = "../../core-subsystem/core-model" }
core-resolver = { path = "../../core-subsystem/core-resolver" }
core-plugin-shared = { path = "../../core-subsystem/core-plugin-shared" }
common = { path = "../../common" }

[dev-dependencies]
tokio.workspace = true
wasm-bindgen-test.workspace = true
sqlparser = "0.61.0"

[target.'cfg(not(target_family = "wasm"))'.dev-dependencies]
exo-sql-pg = { path = "../../../libs/exo-sql/pg", features = [
  "bigdecimal",
] }
exo-sql-pg-connect = { path = "../../../libs/exo-sql/pg-connect", features = [
  "test-support",
  "testing",
] }
exo-sql-pg-schema = { path = "../../../libs/exo-sql/pg-schema", features = [
  "interactive-migration",
  "bigdecimal",
] }
colored.workspace = true

common = { path = "../../common", features = ["test-support"] }
builder = { path = "../../builder" }
postgres-builder = { path = "../postgres-builder" }
core-model-builder = { path = "../../core-subsystem/core-model-builder" }

[lib]
doctest = false
